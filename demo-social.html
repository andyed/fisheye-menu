<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="logo.svg">
<link rel="stylesheet" href="fisheye-menu.css">
<title>How Do You Respond to AI Progress?</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
  }

  .hero {
    padding: 60px 40px 40px;
    max-width: 680px;
  }

  .hero h1 {
    font-size: 32px;
    font-weight: 700;
    color: #e94560;
    margin-bottom: 12px;
    line-height: 1.2;
  }

  .hero p {
    font-size: 17px;
    line-height: 1.6;
    color: #a0a0b0;
    margin-bottom: 8px;
  }

  .hero .subtle {
    font-size: 13px;
    color: #606080;
    margin-top: 24px;
  }

  .hero .subtle a {
    color: #e94560;
    text-decoration: none;
  }
</style>
</head>
<body>

<div id="menubar"></div>

<div class="hero" style="margin-top: 70vh;">
  <p style="font-size: 14px; color: #8888a0;">
    Built with <a href="https://andyed.github.io/fisheye-menu/" style="color: #e94560; text-decoration: none;">Fisheye Menu</a> — Fitts's Law optimized cascading menus.
    <a href="https://andyed.github.io/fisheye-menu/" style="color: #e94560; text-decoration: none; margin-left: 12px;">Live Demo</a>
    <a href="https://github.com/andyed/fisheye-menu" style="color: #e94560; text-decoration: none; margin-left: 12px;">GitHub</a>
  </p>
</div>

  overlay: true,
  onSelect: (item) => console.log('You chose:', item.label),

</body>
</html>
