<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="logo.svg">
<link rel="stylesheet" href="fisheye-menu.css">
<title>How Do You Respond to AI Progress?</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    /* Square viewport for screenshot: set to desired capture size */
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ──────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 40px 40px 20px;
  }

  .header h1 {
    font-size: 32px;
    font-weight: 700;
    color: #e94560;
    line-height: 1.2;
  }

  .header p {
    font-size: 15px;
    color: #c0c0d0;
    margin-top: 4px;
  }

  .header a {
    color: #e94560;
    text-decoration: none;
  }

  /* ── Branding (below menu) ────────────────────── */
  .branding {
    position: fixed;
    top: 75%;
    left: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: #a0a0b8;
  }

  .branding a {
    color: #e94560;
    text-decoration: none;
    margin-left: 4px;
  }

  /* ── Footer ──────────────────────────────────── */
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 24px 40px;
    font-size: 13px;
    color: #9090a0;
  }

  .footer a {
    color: #e94560;
    text-decoration: none;
    margin-left: 8px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>How are you responding to AI progress?</h1>
</div>

<div id="menubar"></div>

<div class="branding">
  <img src="logo.svg" width="32" alt="Fisheye Menu" />
  <span>Fisheye Menu</span>
  <a href="https://github.com/andyed/fisheye-menu">github.com/andyed/fisheye-menu</a>
</div>

<div class="footer">
  <a href="https://andyed.github.io/fisheye-menu/">Live Demo</a>
  <a href="https://github.com/andyed/fisheye-menu">GitHub</a>
</div>

<script type="module">
import { create } from './fisheye-menu.js';

const MENUS = [
  { label: 'Respond to AI Progress', children: [
    { label: 'Ignore', children: [
      { label: '"It\'s just autocomplete"' },
      { label: 'Wait for it to plateau' },
      { label: 'Focus on what humans do best' },
      { label: 'Check back in 2030' },
    ]},
    { label: 'Resist', children: [
      { label: 'Ban it at work' },
      { label: 'Refuse to learn the tools' },
      { label: 'Write angry op-eds' },
      { label: 'Insist on artisanal code' },
    ]},
    { label: 'Worry', children: [
      { label: 'Doom-scroll AI Twitter' },
      { label: 'Stockpile job skills' },
      { label: 'Calculate years until replacement' },
      { label: 'Subscribe to every AI newsletter' },
    ]},
    { label: 'Dabble', children: [
      { label: 'ChatGPT for emails' },
      { label: 'Copilot on easy tasks' },
      { label: 'Generate some images' },
      { label: '"I\'ve tried it"' },
    ]},
    { label: 'Embrace', children: [
      { label: 'Integrate into daily workflow' },
      { label: 'Learn prompt engineering' },
      { label: 'Automate the boring stuff' },
      { label: 'Become the team AI person' },
      { label: 'Ship faster, think bigger' },
    ]},
    { label: 'Obsess', children: [
      { label: '1-Person Startup', children: [
        { label: 'Idea to MVP in a weekend' },
        { label: 'AI writes the code, you own the vision' },
        { label: 'Ship before you hire' },
        { label: 'Ramen profitable on day one' },
      ]},
      { label: 'Internal Advocate', children: [
        { label: 'Run the AI guild at work' },
        { label: 'Build the business case nobody asked for' },
        { label: 'Demo to every team, weekly' },
        { label: 'Measure what you automate' },
      ]},
      { label: 'Vibe Coder', children: [
        { label: 'Describe it, don\'t type it' },
        { label: 'Iterate by conversation' },
        { label: 'Ship things you couldn\'t before' },
        { label: 'Code is a side effect of thinking' },
      ]},
      { label: 'Life Optimizer', children: [
        { label: 'AI meal plans' },
        { label: 'AI fitness coach' },
        { label: 'AI tax strategy' },
        { label: 'AI parenting advice (brave)' },
        { label: 'Automate your entire morning' },
      ]},
      { label: 'Lazy Maximizer', children: [
        { label: '80/20 everything with AI' },
        { label: 'Never write a first draft again' },
        { label: 'Delegate thinking to the machine' },
        { label: 'Minimum effort, maximum output' },
        { label: 'If it takes >5 min, automate it' },
      ]},
      { label: 'Open Source Builder', children: [
        { label: 'AI-assisted contributions at 10x pace' },
        { label: 'Build tools for the community' },
        { label: 'Document everything (AI writes the docs)' },
        { label: 'Maintain more repos than humanly possible' },
      ]},
    ]},
  ]},
];

create(document.getElementById('menubar'), MENUS, {
  overlay: false,
  onSelect: (item) => console.log('You chose:', item.label),
});
</script>
