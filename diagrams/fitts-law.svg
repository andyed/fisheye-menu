<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <style>
    text { fill: #c0c0d0; }
    .label { font-size: 12px; }
    .title { font-size: 14px; font-weight: 600; fill: #e0e0f0; }
    .dim { font-size: 11px; fill: #e94560; }
    .formula { font-size: 13px; font-family: 'Georgia', serif; fill: #a0b0d0; font-style: italic; }
  </style>

  <!-- Left: standard menu (uniform targets) -->
  <text x="100" y="18" text-anchor="middle" class="title">Standard Menu</text>
  <rect x="30" y="30" width="140" height="28" rx="3" fill="#2a3a5c" stroke="#3a4a6c" stroke-width="1"/>
  <rect x="30" y="60" width="140" height="28" rx="3" fill="#2a3a5c" stroke="#3a4a6c" stroke-width="1"/>
  <rect x="30" y="90" width="140" height="28" rx="3" fill="#2a3a5c" stroke="#3a4a6c" stroke-width="1"/>
  <rect x="30" y="120" width="140" height="28" rx="3" fill="#e94560" opacity="0.3" stroke="#e94560" stroke-width="1"/>
  <rect x="30" y="150" width="140" height="28" rx="3" fill="#2a3a5c" stroke="#3a4a6c" stroke-width="1"/>
  <text x="100" y="49" text-anchor="middle" class="label">Item A</text>
  <text x="100" y="79" text-anchor="middle" class="label">Item B</text>
  <text x="100" y="109" text-anchor="middle" class="label">Item C</text>
  <text x="100" y="139" text-anchor="middle" class="label" fill="#e94560">Target</text>
  <text x="100" y="169" text-anchor="middle" class="label">Item E</text>

  <!-- Distance + Width annotations -->
  <line x1="15" y1="30" x2="15" y2="134" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="10" y="82" class="dim" text-anchor="end" transform="rotate(-90, 10, 82)">D (distance)</text>
  <line x1="175" y1="120" x2="175" y2="148" stroke="#808090" stroke-width="1"/>
  <line x1="178" y1="120" x2="185" y2="120" stroke="#808090" stroke-width="1"/>
  <line x1="178" y1="148" x2="185" y2="148" stroke="#808090" stroke-width="1"/>
  <text x="190" y="138" class="dim" fill="#808090">W</text>

  <!-- Cursor -->
  <polygon points="8,28 8,40 16,34" fill="#e94560"/>

  <!-- Right: fisheye menu (expanded target) -->
  <text x="440" y="18" text-anchor="middle" class="title">Fisheye Menu</text>
  <rect x="370" y="38" width="140" height="18" rx="3" fill="#2a3a5c" stroke="#3a4a6c" stroke-width="1"/>
  <rect x="370" y="58" width="140" height="22" rx="3" fill="#2a3a5c" stroke="#3a4a6c" stroke-width="1"/>
  <rect x="370" y="82" width="140" height="30" rx="3" fill="#2a3a5c" stroke="#3a4a6c" stroke-width="1"/>
  <rect x="370" y="114" width="140" height="48" rx="4" fill="#e94560" opacity="0.3" stroke="#e94560" stroke-width="1"/>
  <rect x="370" y="164" width="140" height="18" rx="3" fill="#2a3a5c" stroke="#3a4a6c" stroke-width="1"/>
  <text x="440" y="51" text-anchor="middle" class="label" font-size="10">Item A</text>
  <text x="440" y="73" text-anchor="middle" class="label" font-size="11">Item B</text>
  <text x="440" y="101" text-anchor="middle" class="label">Item C</text>
  <text x="440" y="143" text-anchor="middle" class="label" fill="#e94560" font-size="16">Target</text>
  <text x="440" y="177" text-anchor="middle" class="label" font-size="10">Item E</text>

  <!-- Bigger W annotation -->
  <line x1="515" y1="114" x2="515" y2="162" stroke="#808090" stroke-width="1"/>
  <line x1="518" y1="114" x2="525" y2="114" stroke="#808090" stroke-width="1"/>
  <line x1="518" y1="162" x2="525" y2="162" stroke="#808090" stroke-width="1"/>
  <text x="530" y="142" class="dim" fill="#4ade80">W+</text>

  <!-- Cursor -->
  <polygon points="348,36 348,48 356,42" fill="#e94560"/>

  <!-- Center: formula -->
  <text x="270" y="88" text-anchor="middle" class="formula">MT = a + b log₂(2D/W)</text>
  <text x="270" y="108" text-anchor="middle" class="label" fill="#808090">Larger W = faster acquisition</text>
  <line x1="210" y1="120" x2="330" y2="120" stroke="#3a4a6c" stroke-width="1"/>
  <text x="270" y="138" text-anchor="middle" class="label" fill="#4ade80">Fisheye increases W</text>
  <text x="270" y="155" text-anchor="middle" class="label" fill="#4ade80">for the target item</text>
</svg>
